<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARRIVE | Smart Mobility</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Molle:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-overlay" aria-hidden="true"></div>
  <div class="background-ambient" aria-hidden="true">
    <span class="ambient ambient-1"></span>
    <span class="ambient ambient-2"></span>
  </div>

  <main class="page">
    <header class="hero">
      <img class="logo" src="arrive-logo.png" alt="ARRIVE logo">
      <h1 class="brand-title" aria-label="ARRIVE">
        <span class="letter">A</span>
        <span class="letter">R</span>
        <span class="letter">R</span>
        <span class="letter">I</span>
        <span class="letter">V</span>
        <span class="letter">E</span>
      </h1>
      <p class="subtitle">Smart mobility, reimagined.</p>
    </header>

    <section class="cards" aria-label="ARRIVE mobility choices">
      <button class="card" type="button" data-target="bus.html">
        <span class="icon" aria-hidden="true">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="url(#busGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="busGradient" x1="0" y1="0" x2="24" y2="24"><stop offset="0%" stop-color="#7ca5ff"/><stop offset="100%" stop-color="#49d2ff"/></linearGradient></defs><rect x="4" y="3" width="16" height="18" rx="3"/><path d="M4 11h16"/><path d="M8 15h.01"/><path d="M16 15h.01"/><path d="M6 19v2"/><path d="M18 19v2"/></svg>
        </span>
        <h2>How to arrive with bus</h2>
        <p>Plan your route and choose the best bus option.</p>
      </button>

      <button class="card" type="button" data-target="metro.html">
        <span class="icon" aria-hidden="true">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="url(#metroGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="metroGradient" x1="0" y1="0" x2="24" y2="24"><stop offset="0%" stop-color="#ffca5f"/><stop offset="100%" stop-color="#ff7b54"/></linearGradient></defs><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M4 11h16"/><path d="M12 3v8"/><path d="M8 16h.01"/><path d="M16 16h.01"/><path d="M4 21l3-2"/><path d="M20 21l-3-2"/></svg>
        </span>
        <h2>Nearest metro station</h2>
        <p>Find the closest station and metro-friendly directions.</p>
      </button>

      <button class="card" type="button" data-target="cost.html">
        <span class="icon" aria-hidden="true">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="url(#costGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="costGradient" x1="0" y1="0" x2="24" y2="24"><stop offset="0%" stop-color="#70f5af"/><stop offset="100%" stop-color="#22a469"/></linearGradient></defs><path d="M12 1v22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </span>
        <h2>Cost for smart mobility</h2>
        <p>Compare smart ride costs with Uber, Didi, and inDrive.</p>
      </button>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
