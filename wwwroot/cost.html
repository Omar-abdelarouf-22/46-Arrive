<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARRIVE | Cost for Smart Mobility</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="cost.css">
</head>
<body>
  <div class="background-overlay" aria-hidden="true"></div>
  <div class="bg-ambient" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
  </div>

  <main class="page">
    <header class="header reveal">
      <img class="logo" src="arrive-logo.png" alt="ARRIVE logo">
      <h1>ARRIVE</h1>
      <p>Compare smart mobility costs</p>
    </header>

    <section class="search-panel glass reveal">
      <div class="field-wrap">
        <span class="field-icon" aria-hidden="true">📍</span>
        <input id="fromInput" type="text" placeholder="FROM WHERE?" autocomplete="off">
        <button id="useLocationBtn" class="use-location-btn" type="button" title="Use My Location">🎯</button>
      </div>

      <div class="field-wrap autocomplete-wrapper">
        <span class="field-icon" aria-hidden="true">📍</span>
        <input id="toInput" type="text" placeholder="TO WHERE?" autocomplete="off">
        <ul id="suggestionsList" class="suggestions-list" hidden></ul>
      </div>

      <button id="calculateBtn" class="calculate-btn" type="button">Calculate Cost</button>
      <p id="statusText" class="status-text" role="status" aria-live="polite"></p>
    </section>

    <section class="map-panel glass reveal">
      <div id="map" aria-label="Trip map"></div>
    </section>

    <section class="results-panel reveal" aria-label="Cost comparison results">
      <div class="result-header">
        <h2>Smart Mobility Comparison</h2>
        <p id="distanceText">Distance: -- km</p>
      </div>

      <div id="loadingState" class="loading-state" hidden>
        <span class="spinner" aria-hidden="true"></span>
        <p>Calculating best ride prices...</p>
      </div>

      <div id="resultCards" class="result-cards"></div>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="cost.js"></script>
  <!-- Home Button -->
  <a href="index.html" class="home-btn" aria-label="Return to Home" title="Home">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
      <polyline points="9 22 9 12 15 12 15 22"></polyline>
    </svg>
  </a>

  <style>
    .home-btn {
      position: fixed;
      top: 2.5rem;
      left: 2.5rem;
      width: 96px;
      height: 96px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 9999;
      transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .home-btn:hover {
      transform: translateY(-4px) scale(1.05);
      background: rgba(73, 210, 255, 0.2);
      border-color: rgba(73, 210, 255, 0.5);
      box-shadow: 0 12px 30px rgba(73, 210, 255, 0.3);
      color: #72f0ff;
    }
  </style>
</body>
</html>
