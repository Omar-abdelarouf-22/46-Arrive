<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARRIVE | Bus Route</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="bus.css">
</head>
<body>
  <div class="metro-svg-container" aria-hidden="true">
    <svg viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice" class="metro-svg-bg">
      <defs>
        <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
          <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
        </pattern>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)" />
      <path id="path-bus1" class="bus-path line-blue" d="M -100 300 C 300 100, 500 500, 800 500 S 1000 800, 1200 800" />
      <path id="path-bus2" class="bus-path line-cyan" d="M 200 -100 C 400 300, 300 600, 500 800 S 800 1000, 800 1200" />
      <circle r="12" fill="#ffffff" filter="url(#glow)">
        <animateMotion dur="7s" repeatCount="indefinite"><mpath href="#path-bus1"/></animateMotion>
      </circle>
      <circle r="12" fill="#ffffff" filter="url(#glow)">
        <animateMotion dur="9s" repeatCount="indefinite"><mpath href="#path-bus2"/></animateMotion>
      </circle>
    </svg>
  </div>
  <div class="background-overlay" aria-hidden="true"></div>

  <main class="page shell-enter">
    <header class="header">
      <img class="logo" src="arrive-logo.png" alt="ARRIVE logo">
      <h1>ARRIVE</h1>
      <p class="feature-title">How to arrive with bus</p>
    </header>

    <section class="search-panel glass-card" aria-label="Bus route search">
      <div class="field-wrap">
        <span class="field-icon" aria-hidden="true">📍</span>
        <input id="fromInput" type="text" placeholder="FROM WHERE?" autocomplete="off">
        <div id="fromDropdown" class="autocomplete-dropdown glass-card"></div>
      </div>

      <div class="field-wrap">
        <span class="field-icon" aria-hidden="true">📍</span>
        <input id="toInput" type="text" placeholder="TO WHERE?" autocomplete="off">
        <div id="toDropdown" class="autocomplete-dropdown glass-card"></div>
      </div>

      <div class="actions" style="grid-column: 1 / -1; display: flex; gap: 1rem;">
        <button id="findRouteBtn" class="find-btn" type="button" style="flex: 1;">Find Route</button>
      </div>

      <p id="statusText" class="status-text" role="status" aria-live="polite" style="grid-column: 1 / -1;"></p>
    </section>

    <section class="map-panel glass-card">
      <div id="map" aria-label="Interactive bus map"></div>
    </section>

    <section class="results-panel" aria-label="Bus route results">
      <h2>Suggested Bus Routes</h2>
      <div id="resultCards" class="result-cards"></div>
    </section>

    <div class="location-helper" style="margin-top: 3rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 2rem;">
      <h3 style="margin: 0 0 1rem; font-size: 1.1rem; color: #f3f6ff;">Don't know your nearest station?</h3>
      <button id="useLocationBtn" class="find-btn ghost" style="width: auto; padding: 0 2rem;">Find My Location</button>
      <p id="locationHelperText" style="margin-top: 1rem; color: #a8bdf0; font-size: 0.95rem;"></p>
    </div>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="bus.js"></script>
  <!-- Home Button -->
  <a href="index.html" class="home-btn" aria-label="Return to Home" title="Home">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
      <polyline points="9 22 9 12 15 12 15 22"></polyline>
    </svg>
  </a>

  <style>
    .home-btn {
      position: fixed;
      top: 2.5rem;
      left: 2.5rem;
      width: 96px;
      height: 96px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 9999;
      transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .home-btn:hover {
      transform: translateY(-4px) scale(1.05);
      background: rgba(73, 210, 255, 0.2);
      border-color: rgba(73, 210, 255, 0.5);
      box-shadow: 0 12px 30px rgba(73, 210, 255, 0.3);
      color: #72f0ff;
    }
  </style>
</body>
</html>
