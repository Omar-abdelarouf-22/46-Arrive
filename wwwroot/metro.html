<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARRIVE | Nearest Metro Station</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="metro.css">
</head>
<body>
  <div class="metro-svg-container" aria-hidden="true">
    <svg viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice" class="metro-svg-bg">
      <defs>
        <!-- Grid Pattern -->
        <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
          <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
        </pattern>
        <!-- Neon Glow Filter -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Grid Background -->
      <rect width="100%" height="100%" fill="url(#grid)" />

      <!-- Metro Lines -->
      <path id="path-red" class="metro-path line-red" d="M -100 200 C 300 200, 400 400, 500 500 S 700 800, 1200 800" />
      <path id="path-yellow" class="metro-path line-yellow" d="M 200 -100 C 200 300, 400 400, 500 500 S 600 700, 600 1200" />
      <path id="path-green" class="metro-path line-green" d="M 1200 200 C 800 200, 600 400, 500 500 S 300 700, -100 700" />

      <!-- Animated Moving Trains -->
      <circle r="10" fill="#ffffff" filter="url(#glow)">
        <animateMotion dur="6s" repeatCount="indefinite">
          <mpath href="#path-red"/>
        </animateMotion>
      </circle>
      <circle r="10" fill="#ffffff" filter="url(#glow)">
        <animateMotion dur="8s" repeatCount="indefinite">
          <mpath href="#path-yellow"/>
        </animateMotion>
      </circle>
      <circle r="10" fill="#ffffff" filter="url(#glow)">
        <animateMotion dur="7s" repeatCount="indefinite">
          <mpath href="#path-green"/>
        </animateMotion>
      </circle>

      <!-- Main Central Transfer Station (Sadat/Attaba vibe) -->
      <circle class="station-node" cx="500" cy="500" r="16" fill="#01040a" stroke="#fff" stroke-width="5" />
      <circle class="station-node pulse" cx="500" cy="500" r="16" fill="none" stroke="#fff" stroke-width="3" />

      <!-- Line 1 Stations -->
      <circle class="station-node" cx="130" cy="200" r="10" fill="#ff3366" stroke="#fff" stroke-width="3" />
      <circle class="station-node" cx="350" cy="265" r="10" fill="#ff3366" stroke="#fff" stroke-width="3" />
      <circle class="station-node" cx="600" cy="650" r="10" fill="#ff3366" stroke="#fff" stroke-width="3" />
      <circle class="station-node" cx="850" cy="800" r="10" fill="#ff3366" stroke="#fff" stroke-width="3" />

      <!-- Line 2 Stations -->
      <circle class="station-node" cx="200" cy="150" r="10" fill="#ffca5f" stroke="#fff" stroke-width="3" />
      <circle class="station-node" cx="300" cy="350" r="10" fill="#ffca5f" stroke="#fff" stroke-width="3" />
      <circle class="station-node" cx="600" cy="850" r="10" fill="#ffca5f" stroke="#fff" stroke-width="3" />

      <!-- Line 3 Stations -->
      <circle class="station-node" cx="950" cy="200" r="10" fill="#00e676" stroke="#fff" stroke-width="3" />
      <circle class="station-node" cx="650" cy="350" r="10" fill="#00e676" stroke="#fff" stroke-width="3" />
      <circle class="station-node" cx="350" cy="650" r="10" fill="#00e676" stroke="#fff" stroke-width="3" />
      <circle class="station-node" cx="150" cy="700" r="10" fill="#00e676" stroke="#fff" stroke-width="3" />
    </svg>
  </div>
  <div class="background-overlay" aria-hidden="true"></div>

  <main class="page">
    <header class="header reveal header-reveal">
      <img class="logo" src="arrive-logo.png" alt="ARRIVE logo">
      <h1>ARRIVE</h1>
      <p>Find your nearest metro station</p>
    </header>

    <section class="search-panel glass reveal search-reveal" aria-label="Search nearest metro station">
      <div class="input-wrap">
        <span class="input-icon" aria-hidden="true">📍</span>
        <input id="locationInput" type="text" placeholder="Enter your location or use current location" autocomplete="off">
      </div>
      <div class="actions">
        <button id="useLocationBtn" class="btn ghost" type="button">Use My Location</button>
        <button id="findNearestBtn" class="btn primary" type="button">Find Nearest Station</button>
      </div>
      <p id="statusText" class="status-text" role="status" aria-live="polite"></p>
      <div id="loadingBar" class="loading-bar" aria-hidden="true"></div>
    </section>

    <section class="map-panel glass reveal map-reveal">
      <div id="map" aria-label="Metro map"></div>
      <div class="legend glass-soft" aria-label="Map legend">
        <span><i class="dot station-dot"></i> Metro station</span>
        <span><i class="dot nearest-dot"></i> Nearest station</span>
        <span><i class="dot user-dot"></i> Your location</span>
      </div>
    </section>

    <section class="result-wrap reveal result-reveal" aria-label="Nearest station result">
      <article id="resultCard" class="result-card glass-soft">
        <h2>Nearest Station</h2>
        <p id="stationName">Waiting for location...</p>
        <p id="stationDistance" class="distance">Distance: -- km</p>
      </article>
    </section>

    <!-- NEW TICKET CALCULATOR FEATURE -->
    <section class="search-panel glass reveal search-reveal" style="margin-top: 1.5rem;" aria-label="Metro Ticket Calculator">
      <h2 style="margin-top:0; font-size: 1.3rem;">🎟️ Metro Ticket Calculator</h2>
      <p style="color: var(--text-soft); font-size: 0.9rem; margin-bottom: 1rem;">Select start and end stations to calculate the number of stops and your ticket price.</p>
      
      <div class="input-wrap" style="margin-bottom: 0.5rem; position: relative;">
        <input id="startStationInput" type="text" class="metro-select" placeholder="Start Station..." autocomplete="off">
        <input type="hidden" id="startStationId">
        <div id="startDropdown" class="autocomplete-dropdown glass-card"></div>
      </div>
      
      <div class="input-wrap" style="margin-bottom: 1rem; position: relative;">
        <input id="endStationInput" type="text" class="metro-select" placeholder="End Station..." autocomplete="off">
        <input type="hidden" id="endStationId">
        <div id="endDropdown" class="autocomplete-dropdown glass-card"></div>
      </div>

      <div class="actions">
        <button id="calculateTicketBtn" class="btn primary" type="button" style="width: 100%;">Calculate Ticket</button>
      </div>
      
      <div id="ticketResult" class="result-card glass-soft" style="margin-top: 1rem; display: none;">
        <h3 style="margin-top: 0; font-size: 1.1rem; color: #79b8ff;">🎫 Journey Info</h3>
        <p id="ticketStops" style="margin: 0.5rem 0;">Stops: --</p>
        <p id="ticketPrice" style="margin: 0; font-size: 1.5rem; font-weight: bold; color: #ffca5f;">-- EGP</p>
      </div>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.js"></script>
  <script src="metro.js?v=2.1"></script>
  <!-- Home Button -->
  <a href="index.html" class="home-btn" aria-label="Return to Home" title="Home">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
      <polyline points="9 22 9 12 15 12 15 22"></polyline>
    </svg>
  </a>

  <style>
    .home-btn {
      position: fixed;
      top: 2.5rem;
      left: 2.5rem;
      width: 96px;
      height: 96px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 9999;
      transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .home-btn:hover {
      transform: translateY(-4px) scale(1.05);
      background: rgba(73, 210, 255, 0.2);
      border-color: rgba(73, 210, 255, 0.5);
      box-shadow: 0 12px 30px rgba(73, 210, 255, 0.3);
      color: #72f0ff;
    }
  </style>
</body>
</html>
